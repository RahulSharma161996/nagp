apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: nagp-2026
data:
  01-init.sql: |
    CREATE TABLE IF NOT EXISTS records (
      id   INT PRIMARY KEY,
      name TEXT NOT NULL,
      value INT NOT NULL
    );

    INSERT INTO records (id, name, value) VALUES
      (1, 'alpha', 10),
      (2, 'bravo', 20),
      (3, 'charlie', 30),
      (4, 'delta', 40),
      (5, 'echo', 50),
      (6, 'foxtrot', 60),
      (7, 'golf', 70)
    ON CONFLICT (id) DO NOTHING;
